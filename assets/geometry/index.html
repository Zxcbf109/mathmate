<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f5f9ff;
        touch-action: none;
      }
      #jxgbox {
        width: 100%;
        height: calc(100% - 56px);
      }
      #toolbar {
        display: flex;
        align-items: center;
        height: 56px;
        padding: 0 8px;
        background: #fff;
        border-bottom: 1px solid #e0e0e0;
        gap: 4px;
        overflow-x: auto;
      }
      #toolbar button {
        min-width: 48px;
        height: 40px;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        background: #fff;
        font-size: 13px;
        color: #333;
        cursor: pointer;
        white-space: nowrap;
        padding: 0 10px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      #toolbar button.active {
        background: #3F51B5;
        color: #fff;
        border-color: #3F51B5;
      }
      #toolbar button.danger {
        color: #e53935;
        border-color: #e53935;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="btn-select" class="active">🔗 拖拽</button>
      <button id="btn-point">📍 描点</button>
      <button id="btn-line">📏 连线</button>
      <button id="btn-circle">⭕ 画圆</button>
      <button id="btn-delete" class="danger">🗑 删除</button>
      <button id="btn-clear" class="danger">清除</button>
    </div>
    <div id="jxgbox"></div>
    <script src="jsxgraphcore.js"></script>
    <script src="geometry_engine.js"></script>
  </body>
</html>
